<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Hospitals - Health Companion</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="logo">Health Companion</a>
      <button
        class="menu-toggle"
        onclick="toggleMenu()"
        aria-label="Toggle menu"
      >
        &#9776;
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="wellness.html">Wellness</a></li>
        <li><a href="symptoms.html">Symptoms</a></li>
        <li><a href="clinics.html" class="active">Clinics</a></li>
        <li><a href="chatbot.html">AI Doctor</a></li>
      </ul>
    </nav>

    <section class="dashboard-hero">
      <div class="dashboard-hero-content">
        <h1>📍 Find Hospitals</h1>
        <p>Locate hospitals and clinics near your current location.</p>
      </div>
    </section>

    <section class="dashboard-cards-container">
      <div class="dash-card map-card">
        <h2>Nearby Hospitals</h2>
        <p class="subtitle">
          Choose a specialist and we’ll show hospitals near you (with distance).
        </p>

        <div class="clinic-controls">
          <label for="specialtySelect">Select specialty</label>
          <select id="specialtySelect">
            <option value="all">General / All Facilities</option>
            <option value="cardiac">Cardiac / Heart</option>
            <option value="neuro">Neurology / Brain</option>
            <option value="derma">Dermatology / Skin</option>
            <option value="pediatric">Pediatrics / Children</option>
            <option value="ortho">Orthopedics / Bones</option>
            <option value="dental">Dental / Dentist</option>
            <option value="eye">Ophthalmology / Eye Care</option>
            <option value="gynae">Gynecology / Women's Health</option>
          </select>
          <button class="btn-primary" onclick="findHospitals()" id="findBtn">
            Find Nearby
          </button>
        </div>

        <div id="clinicsStatus" class="clinic-status"></div>
        <div id="clinicResults" class="clinic-results"></div>

        <div id="map" class="map-container" style="display: none">
          <iframe
            width="100%"
            height="400"
            style="border-radius: 12px; border: 0"
            src="https://www.google.com/maps?q=hospital+near+me&output=embed"
          >
          </iframe>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>&copy; 2026 Health Companion. Your health, our priority.</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
