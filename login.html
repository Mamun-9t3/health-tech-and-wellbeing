<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Health Companion</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: #f5f7fa;
      }
      .login-card {
        background: #fff;
        padding: 32px 24px;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        max-width: 400px;
        width: 100%;
      }
      .login-card h2 { margin-bottom: 24px; text-align: center; font-size: 1.5rem; color: #1e293b; }
      .login-card label { display: block; margin: 12px 0 6px; font-weight: 500; font-size: 0.95rem; }
      .login-card input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
      .login-card .btn-primary { width: 100%; margin-top: 24px; }
      .error-msg { color: #e00; text-align: center; margin-top: 8px; display: none; font-size: 0.9rem; }
      .success-msg { color: #0a0; text-align: center; margin-top: 8px; display: none; font-size: 0.9rem; }
      @media (max-width: 480px) { .login-card { padding: 24px 16px; } }
    </style>
  </head>
  <body style="background: #f8fafc; margin: 0; min-height: 100vh; display: flex; flex-direction: column;">
    <nav class="navbar">
      <a href="index.html" class="logo">Health Companion</a>
    </nav>
    <section class="dashboard-hero">
      <div class="dashboard-hero-content">
        <h1>🔐 Login</h1>
        <p>Access your health data and wellness scores.</p>
      </div>
    </section>
    <section class="dashboard-cards-container" style="max-width: 500px; width: 100%;">
      <div class="dash-card login-card" style="margin: 0 auto; width: 100%;">
        <h2>Welcome Back</h2>
        <p id="errorMsg" class="error-msg"></p>
        <p id="successMsg" class="success-msg"></p>

        <form id="loginForm">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" name="password" placeholder="Your password" required style="padding-right:40px;" />
            <span id="togglePwd" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1rem;color:#888;">👁️</span>
          </div>

          <button type="submit" class="btn-primary" id="loginBtn">Login</button>
        </form>

        <p style="text-align:center;margin-top:16px;">
          New here? <a href="register.html" id="create_account">Create an account</a>
        </p>
      </div>
    </div>

    <script>
      // Show existing session
      fetch('/api/me', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(user => {
          if (user) window.location.href = 'index.html';
        });

      document.getElementById('togglePwd').addEventListener('click', function () {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
        this.textContent = input.type === 'password' ? '👁️' : '🙈';
      });

      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const errorEl  = document.getElementById('errorMsg');
        const successEl = document.getElementById('successMsg');
        const btn      = document.getElementById('loginBtn');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        btn.disabled   = true;
        btn.textContent = 'Logging in...';

        const body = {
          username: document.getElementById('username').value.trim(),
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        };

        try {
          const res  = await fetch('/api/login', {
            method:      'POST',
            credentials: 'include',
            headers:     { 'Content-Type': 'application/json' },
            body:        JSON.stringify(body),
          });
          const data = await res.json();

          if (!res.ok) {
            errorEl.textContent    = data.error || 'Login failed.';
            errorEl.style.display  = 'block';
            btn.disabled           = false;
            btn.textContent        = 'Login';
          } else {
            successEl.textContent   = `Welcome back, ${data.user.username}! Redirecting...`;
            successEl.style.display = 'block';
            setTimeout(() => window.location.href = 'index.html', 1000);
          }
        } catch (err) {
          errorEl.textContent   = 'Network error. Is the server running?';
          errorEl.style.display = 'block';
          btn.disabled          = false;
          btn.textContent       = 'Login';
        }
      });
    </script>
  </body>
</html>
